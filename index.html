<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<title>Studio Ju Castro — Agendamentos</title>
<meta name="description" content="Studio Ju Castro — Nanopigmentação, Despigmentação e Design de Sobrancelhas. Especialista em naturalidade. Atendimentos em Pelotas e Campinas." />
<meta property="og:title" content="Studio Ju Castro — Especialista em naturalidade" />
<meta property="og:description" content="Nanopigmentação · Despigmentação · Design. Pelotas e Campinas. Agende pelo WhatsApp." />
<meta property="og:type" content="website" />
<meta name="theme-color" content="#F5EFEA" />
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@200;300;400;500;600;700&family=Outfit:wght@200;300;400;500&display=swap" rel="stylesheet">
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='.9em' font-size='90'%3E🤍%3C/text%3E%3C/svg%3E">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  :root {
    --cream: #F5EFEA;
    --cream-deep: #EDE3DB;
    --rose: #C8A593;
    --rose-soft: #DCC4B5;
    --mocha: #4A3E36;
    --mocha-deep: #2A2520;
    --ink: #1A1614;
    --green: #25D366;
    --green-deep: #1FB855;
    --green-glow: rgba(37, 211, 102, 0.4);
  }

  html, body { height: 100%; }
  body {
    font-family: 'Manrope', system-ui, -apple-system, sans-serif;
    background: var(--cream);
    color: var(--mocha-deep);
    font-weight: 300;
    -webkit-font-smoothing: antialiased;
    overflow: hidden;
  }

  .page {
    height: 100svh;
    min-height: 100vh;
    display: grid;
    grid-template-columns: 1.1fr 1fr;
  }

  /* ---------- LEFT: PHOTO ---------- */
  .photo-side {
    position: relative;
    overflow: hidden;
    background: linear-gradient(135deg, var(--rose-soft), var(--rose));
  }
  .photo-side img {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    object-fit: cover;
    object-position: center 25%;
  }
  .photo-side::after {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(to right, transparent 60%, rgba(245,239,234,0.55) 100%);
    pointer-events: none;
  }
  .photo-watermark {
    position: absolute;
    bottom: 24px;
    left: 24px;
    z-index: 2;
    font-family: 'Outfit', sans-serif;
    font-weight: 200;
    font-size: 11px;
    letter-spacing: 0.3em;
    text-transform: uppercase;
    color: rgba(245,239,234,0.85);
    text-shadow: 0 1px 8px rgba(0,0,0,0.25);
  }

  /* ---------- RIGHT: CONTENT ---------- */
  .content {
    padding: clamp(28px, 4vw, 56px);
    display: flex;
    flex-direction: column;
    justify-content: center;
    gap: clamp(20px, 3vh, 36px);
    background: var(--cream);
    position: relative;
  }
  .brand {
    font-family: 'Outfit', sans-serif;
    font-weight: 200;
    letter-spacing: 0.32em;
    font-size: 12px;
    text-transform: uppercase;
    color: var(--rose);
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .brand::before {
    content: '';
    width: 28px;
    height: 1px;
    background: var(--rose);
  }
  .headline {
    font-family: 'Outfit', sans-serif;
    font-weight: 200;
    font-size: clamp(40px, 5vw, 72px);
    line-height: 0.95;
    letter-spacing: -0.02em;
    color: var(--ink);
  }
  .headline em {
    font-style: italic;
    font-weight: 300;
    color: var(--rose);
    display: block;
  }
  .headline .sparkle {
    display: inline-block;
    font-style: normal;
    font-size: 0.7em;
    vertical-align: middle;
    margin-left: 4px;
    color: var(--rose);
  }
  .services {
    font-family: 'Manrope', sans-serif;
    font-size: clamp(13px, 1vw, 15px);
    font-weight: 500;
    letter-spacing: 0.04em;
    color: var(--mocha-deep);
    line-height: 1.5;
    margin-top: -8px;
  }
  .services .pipe {
    color: var(--rose);
    font-weight: 300;
    margin: 0 8px;
    opacity: 0.85;
  }

  /* ---------- CTAs ---------- */
  .ctas {
    display: flex;
    flex-direction: column;
    gap: 12px;
    margin-top: 8px;
  }
  .cta-label {
    font-size: 10px;
    letter-spacing: 0.32em;
    text-transform: uppercase;
    color: var(--mocha);
    font-weight: 600;
    margin-bottom: 4px;
    opacity: 0.65;
  }
  .btn {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 18px 24px;
    background: var(--green);
    color: #fff;
    text-decoration: none;
    font-size: 15px;
    font-weight: 600;
    letter-spacing: 0.02em;
    border-radius: 14px;
    box-shadow: 0 8px 24px -8px var(--green-glow), 0 2px 0 rgba(0,0,0,0.04);
    transition: transform 0.2s ease, background 0.2s ease, box-shadow 0.2s ease;
    position: relative;
    overflow: hidden;
  }
  .btn:hover {
    background: var(--green-deep);
    transform: translateY(-2px);
    box-shadow: 0 14px 32px -10px var(--green-glow), 0 2px 0 rgba(0,0,0,0.06);
  }
  .btn:active { transform: translateY(0); }
  .btn-left {
    display: flex;
    align-items: center;
    gap: 14px;
  }
  .btn-icon {
    width: 22px;
    height: 22px;
    flex-shrink: 0;
  }
  .btn-icon svg { width: 100%; height: 100%; fill: currentColor; }
  .btn-text {
    display: flex;
    flex-direction: column;
    line-height: 1.2;
  }
  .btn-text small {
    font-size: 10px;
    font-weight: 500;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    opacity: 0.8;
  }
  .btn-arrow {
    width: 22px;
    height: 22px;
    opacity: 0.85;
    transition: transform 0.2s ease;
  }
  .btn:hover .btn-arrow { transform: translateX(4px); }

  /* ---------- INSTAGRAM ---------- */
  .insta-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding-top: clamp(12px, 2vh, 20px);
    border-top: 1px solid rgba(74,62,54,0.12);
    margin-top: 4px;
  }
  .insta-link {
    display: flex;
    align-items: center;
    gap: 10px;
    color: var(--mocha-deep);
    text-decoration: none;
    font-size: 13px;
    letter-spacing: 0.04em;
    font-weight: 500;
    transition: color 0.2s ease;
  }
  .insta-link:hover { color: var(--rose); }
  .insta-link svg { width: 18px; height: 18px; }
  .footer-mini {
    font-size: 10px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--mocha);
    opacity: 0.5;
  }

  /* ---------- MOBILE ---------- */
  @media (max-width: 880px) {
    body { overflow-y: auto; overflow-x: hidden; }
    .page {
      grid-template-columns: 1fr;
      grid-template-rows: 38svh 1fr;
      height: 100svh;
      min-height: 640px;
    }
    .photo-side::after {
      background: linear-gradient(to bottom, transparent 60%, rgba(245,239,234,0.65) 100%);
    }
    .photo-watermark {
      top: 20px;
      left: 20px;
      bottom: auto;
    }
    .content {
      padding: 28px 24px 32px;
      gap: 16px;
      justify-content: flex-start;
    }
    .headline { font-size: clamp(36px, 9vw, 52px); }
    .tagline { font-size: 14px; }
    .insta-row { padding-top: 14px; }
  }

  @media (max-height: 640px) and (max-width: 880px) {
    .page { grid-template-rows: 30svh 1fr; }
    .headline { font-size: 34px; }
    .ctas { gap: 10px; }
    .btn { padding: 14px 20px; font-size: 14px; }
  }

  /* iOS safe area */
  @supports (padding: max(0px)) {
    .content { padding-bottom: max(clamp(28px, 4vw, 56px), env(safe-area-inset-bottom)); }
  }
</style>
</head>
<body>

<main class="page">

        <span class="btn-left">

            </svg>

    <div class="insta-row">
      <a class="insta-link" href="https://instagram.com/studio.jucastro" target="_blank" rel="noopener">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6">

  </div>
</main>

</body>
</html>
